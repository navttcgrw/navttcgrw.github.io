<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options - Skills Verification Program</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
body {
    background: #f4f8fa;
    color: #333;
}
header {
    background: white;
    width: 100%;
    padding: 0px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.logo img {
    height: 90px;
}
.logo a {
    text-decoration: none;
}

/* RIGHT SECTION */
.right-section {
    display: flex;
    align-items: center;
}

.header-text {
    color: black;
    font-size: 16px;
    margin-right: 10px;
}

.menu-icon {
    font-size: 28px;
    color: black;
    cursor: pointer;
}

/* SIDE MENU */
.side-menu {
    position: fixed;
    top: 0;
    right: -320px;
    width: 320px;
    height: 100%;
    background: rgba(255,255,255,0.60);
    backdrop-filter: blur(12px);
    padding: 25px;
    transition: 0.3s;
}

.side-menu.active { right: 0; }

.close-btn {
    font-size: 24px;
    text-align: right;
    cursor: pointer;
    margin-bottom: 20px;
}

/* MENU */
.side-menu ul { list-style: none; }

.side-menu ul li {
    padding: 0;
    border-bottom: 1px solid #ddd;
}

.side-menu ul li a {
    display: block;
    padding: 15px 0;
    cursor: pointer;
    color: #333;
    text-decoration: none;
    transition: 0.2s;
}

.side-menu ul li a:hover {
    color: #1e8c8d;
}

/* CONTACT SMOOTH DROPDOWN */
.contact-arrow { float: right; }

.contact-dropdown {
    max-height: 0;
    overflow: hidden;
    transition: 0.4s ease;
    padding-left: 10px;
    font-size: 14px;
}

.contact.active .contact-dropdown {
    max-height: 100px;
    margin-top: 10px;
}

main {
    min-height: calc(100vh - 190px);
    padding: 60px 40px 40px;
}
.page-intro {
    max-width: 900px;
    margin: 0 auto 40px;
    text-align: center;
}
.page-intro h1 {
    font-size: 36px;
    color: #1e8c8d;
    margin-bottom: 16px;
}
.page-intro p {
    font-size: 16px;
    line-height: 1.7;
    color: #555;
}
.option-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
}
.option-card {
    background: white;
    border-radius: 18px;
    padding: 32px 28px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    border: 1px solid rgba(30,140,141,0.12);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}
.option-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 38px rgba(0,0,0,0.12);
}
.option-icon {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background: #e9f6f6;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    color: #1e8c8d;
    font-size: 28px;
}
.option-card h2 {
    font-size: 24px;
    margin-bottom: 14px;
    color: #163d44;
}
.option-card p {
    color: #5c6c72;
    line-height: 1.75;
    margin-bottom: 26px;
}
.option-card .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    background: #1e8c8d;
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    transition: background 0.2s;
}
.option-card .action-btn:hover {
    background: #146d6d;
}
footer {
    background: #f5f5f5;
    padding: 40px;
    text-align: center;
}

.footer-top-label {
    display: inline-block;
    background: #1e8c8d;
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 18px;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 18px;
